<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>None Search</title>
<style>
  :root {
    --bg: #0a0a0c;
    --glass: rgba(255, 255, 255, 0.04);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-hover: rgba(255, 255, 255, 0.07);
    --text: #f4f4f6;
    --text-muted: #8a8a96;
    --ease: cubic-bezier(0.25, 0.8, 0.25, 1);
    --glow-r: 180;
    --glow-g: 160;
    --glow-b: 200;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
  
  /* Анимация появления видео в поиске */
  @keyframes searchResultAppear {
    0% { opacity: 0; transform: scale(1.5) translateY(-20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ── Top Bar ── */
  .topbar {
    height: 60px; background: rgba(10, 10, 12, 0.85); border-bottom: 1px solid var(--glass-border);
    display: flex; align-items: center; padding: 0 24px; gap: 20px; z-index: 100;
    backdrop-filter: blur(12px); position: sticky; top: 0;
  }
  .logo { font-weight: 800; font-size: 20px; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: transform 0.2s; }
  .logo:hover { transform: scale(1.03); }
  .logo span { background: var(--text); color: #000; padding: 3px 8px; border-radius: 5px; font-size: 11px; }
  
  .search-wrap { flex: 1; max-width: 600px; margin: 0 auto; position: relative; }
  .search-wrap input {
    width: 100%; background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border);
    border-radius: 24px; padding: 12px 20px; color: var(--text); font-size: 15px; outline: none; transition: all 0.3s var(--ease);
  }
  .search-wrap input:focus { border-color: var(--accent); background: rgba(255,255,255,0.09); box-shadow: 0 0 15px rgba(0,212,255,0.15); }
  .search-wrap button {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.1); border: none; color: var(--text);
    padding: 8px 16px; border-radius: 18px; cursor: pointer; font-size: 14px; transition: all 0.2s var(--ease);
  }
  .search-wrap button:hover { background: rgba(255,255,255,0.2); transform: translateY(-50%) scale(1.05); }

  /* ── Main Content Scroll ── */
  .main-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  /* ── Home Page (Categories) ── */
  .home-page {
    display: block;
    animation: fadeIn 0.5s var(--ease);
  }
  .home-page.hidden { display: none; }

  .category-section {
    margin-bottom: 48px;
    opacity: 0;
    animation: slideIn 0.6s var(--ease) forwards;
  }
  .category-section:nth-child(1) { animation-delay: 0.1s; }
  .category-section:nth-child(2) { animation-delay: 0.2s; }
  .category-section:nth-child(3) { animation-delay: 0.3s; }
  .category-section:nth-child(4) { animation-delay: 0.4s; }

  .category-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-left: 8px;
  }
  .category-icon { font-size: 28px; }
  .category-title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .video-row {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    padding: 10px 4px 20px;
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: var(--glass-border) transparent;
  }
  .video-row::-webkit-scrollbar { height: 6px; }
  .video-row::-webkit-scrollbar-track { background: transparent; }
  .video-row::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }

  .video-card {
    flex: 0 0 280px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s var(--ease);
    opacity: 0;
    transform: translateY(20px) scale(0.92);
    animation: fadeInUp 0.4s var(--ease) forwards;
  }
  @keyframes fadeInUp {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .video-card:hover {
    background: var(--glass-hover);
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    border-color: rgba(255,255,255,0.2);
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    position: relative;
    overflow: hidden;
    background: #111;
  }
  .card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s var(--ease);
  }
  .video-card:hover .card-thumb img { transform: scale(1.1); }
  
  .card-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    color: #fff;
    backdrop-filter: blur(4px);
  }
  .card-duration {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.85);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  .card-info { padding: 14px; }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 8px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
  }

  /* ── Search Results Page ── */
  .search-page {
    display: none;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 0;
  }
  .search-page.active { display: block; animation: fadeIn 0.4s var(--ease); }

  .search-header {
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--glass-border);
  }
  .search-query {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .search-count {
    font-size: 14px;
    color: var(--text-muted);
  }

  .search-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .search-item {
    display: flex;
    gap: 16px;
    padding: 14px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s var(--ease);
    opacity: 0;
    transform: scale(1.5) translateY(-30px);
  }
  .search-item.visible {
    animation: searchResultAppear 0.2s var(--ease) forwards;
  }
  .search-item:hover {
    background: var(--glass-hover);
    transform: translateX(8px) scale(1.01);
    border-color: rgba(255,255,255,0.15);
  }

  .search-thumb {
    width: 280px;
    height: 158px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }
  .search-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s var(--ease);
  }
  .search-item:hover .search-thumb img { transform: scale(1.08); }
  
  .search-platform {
    position: absolute;
    top: 8px;
    left: 8px;
    padding: 4px 8px;
    border-radius: 5px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    color: #fff;
  }
  .search-time {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.85);
    padding: 3px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  .search-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .search-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 10px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .search-channel {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .search-views {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ── Video Player Page ── */
  .player-page {
    display: none;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
  }
  .player-page.active { display: flex; gap: 24px; animation: fadeIn 0.4s var(--ease); }

  .player-main { flex: 1; min-width: 0; }
  
  .video-frame-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    position: relative;
  }
  .video-frame-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .video-info-box {
    margin-top: 20px;
    padding: 24px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
  }
  .video-info-box h1 {
    font-size: 22px;
    margin-bottom: 14px;
    line-height: 1.3;
  }
  .video-stats {
    display: flex;
    gap: 20px;
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--glass-border);
  }
  
  .action-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .action-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    cursor: pointer;
    transition: all 0.2s var(--ease);
    font-size: 14px;
    color: var(--text);
  }
  .action-btn:hover {
    background: rgba(255,255,255,0.12);
    transform: scale(1.05);
  }
  .action-btn:active { transform: scale(0.96); }
  .action-btn.active {
    background: rgba(0,212,255,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Sidebar (Related) ── */
  .sidebar {
    width: 400px;
    flex-shrink: 0;
    display: none;
  }
  .sidebar.active { display: block; animation: slideIn 0.5s var(--ease) 0.1s both; }
  
  .sidebar-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--glass-border);
  }

  .related-item {
    display: flex;
    gap: 12px;
    padding: 10px;
    margin-bottom: 10px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s var(--ease);
  }
  .related-item:hover {
    background: var(--glass-hover);
    transform: translateX(-5px);
  }
  
  .rel-thumb {
    width: 168px;
    height: 94px;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .rel-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .rel-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .rel-title {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 4px;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .rel-meta {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── Utils ── */
  .hidden { display: none !important; }
  .error-msg {
    text-align: center;
    padding: 40px;
    color: #ff6b6b;
    font-size: 16px;
    background: rgba(255,100,100,0.05);
    border: 1px solid rgba(255,100,100,0.2);
    border-radius: 12px;
    margin: 20px;
  }

  @media (max-width: 1200px) {
    .sidebar { width: 350px; }
    .search-thumb { width: 240px; height: 135px; }
  }
  @media (max-width: 1024px) {
    .player-page.active { flex-direction: column; }
    .sidebar { width: 100%; }
  }
  @media (max-width: 768px) {
    .search-thumb { width: 100%; height: auto; aspect-ratio: 16/9; }
    .search-item { flex-direction: column; }
  }
</style>
</head>
<body>

<nav class="topbar">
  <div class="logo" onclick="showHome()">None<span>Search</span></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Поиск видео по всем платформам...">
    <button id="searchBtn">🔍</button>
  </div>
</nav>

<div class="main-scroll" id="mainScroll">
  
  <!-- HOME PAGE (Categories) -->
  <div id="homePage" class="home-page">
    <div id="categoriesContainer"></div>
  </div>

  <!-- SEARCH RESULTS PAGE -->
  <div id="searchPage" class="search-page">
    <div class="search-header">
      <div class="search-query" id="searchQueryText">Результаты поиска</div>
      <div class="search-count" id="searchCountText">0 видео найдено</div>
    </div>
    <div class="search-grid" id="searchGrid"></div>
  </div>

  <!-- VIDEO PLAYER PAGE -->
  <div id="playerPage" class="player-page">
    <div class="player-main">
      <div class="video-frame-wrap">
        <iframe id="videoFrame" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
      <div class="video-info-box">
        <h1 id="playerTitle">Загрузка...</h1>
        <div class="video-stats">
          <span id="playerChannel">Канал</span>
          <span id="playerViews">0 просмотров</span>
          <span id="playerPlatform">Платформа</span>
        </div>
        <div class="action-bar">
          <button class="action-btn" id="btnLike">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14zM7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>
            Нравится
          </button>
          <button class="action-btn" id="btnShare">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
            Поделиться
          </button>
          <button class="action-btn" id="btnSave">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
            Сохранить
          </button>
        </div>
      </div>
    </div>
    
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title">Похожие видео</div>
      <div id="relatedList"></div>
    </aside>
  </div>

</div>

<script>
// ═══════════════════════════════════════
//  🔗 BACKEND URL
// ═══════════════════════════════════════
const API_URL = 'https://video-search-backend-production.up.railway.app';

let allVideosCache = [];
let currentVideo = null;

// ── API Fetch ──
async function fetchVideos(query, filter = 'mix') {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);
    
    const res = await fetch(`${API_URL}/api/search`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
      signal: controller.signal
    });
    
    clearTimeout(timeoutId);
    
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    
    let videos = data.videos || [];
    if (filter === 'rutube') videos = videos.filter(v => v.platform === 'Rutube');
    return videos;
    
  } catch (e) {
    console.error('Backend error:', e);
    throw new Error('Не удалось подключиться к серверу. Проверьте интернет и попробуйте позже.');
  }
}

// ── Navigation ──
function showHome() {
  document.getElementById('homePage').classList.remove('hidden');
  document.getElementById('searchPage').classList.remove('active');
  document.getElementById('playerPage').classList.remove('active');
  document.getElementById('sidebar').classList.remove('active');
  document.getElementById('searchInput').value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showSearch() {
  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('playerPage').classList.remove('active');
  document.getElementById('sidebar').classList.remove('active');
  document.getElementById('searchPage').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showPlayer(video, relatedVideos = []) {
  currentVideo = video;
  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('searchPage').classList.remove('active');
  document.getElementById('playerPage').classList.add('active');
  document.getElementById('sidebar').classList.add('active');
  
  // Update player info
  document.getElementById('playerTitle').textContent = video.title;
  document.getElementById('playerChannel').textContent = video.channel;
  document.getElementById('playerViews').textContent = video.views || '0 просмотров';
  document.getElementById('playerPlatform').textContent = video.platform;
  
  // Load video iframe (YouTube controls hidden)
  let embedUrl = '';
  if (video.platform === 'YouTube') {
    const urlParams = new URLSearchParams(new URL(video.url).search);
    const videoId = urlParams.get('v');
    embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=0&modestbranding=1&rel=0&disablekb=1`;
  } else if (video.platform === 'Rutube') {
    const cleanId = video.url.split('/').filter(Boolean).pop();
    embedUrl = `https://rutube.ru/play/embed/${cleanId}?autoplay=1`;
  } else if (video.platform === 'Dailymotion') {
    const id = video.url.split('/').pop();
    embedUrl = `https://www.dailymotion.com/embed/video/${id}?autoplay=1`;
  }
  
  document.getElementById('videoFrame').src = embedUrl;
  
  // Load related videos
  loadRelatedVideos(relatedVideos);
  
  // Reset buttons
  document.getElementById('btnLike').classList.remove('active');
  document.getElementById('btnSave').classList.remove('active');
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Render Categories (Home Page) ──
async function renderCategories() {
  const container = document.getElementById('categoriesContainer');
  container.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-muted)">Загрузка категорий...</div>';
  
  const cats = [
    { id: 'rec', title: 'Рекомендации', icon: '🔥', query: 'популярное', filter: 'mix' },
    { id: 'movies', title: 'Фильмы', icon: '🎬', query: 'фильмы', filter: 'rutube' },
    { id: 'games', title: 'Игры', icon: '🎮', query: 'игры', filter: 'mix' },
    { id: 'music', title: 'Музыка', icon: '🎵', query: 'музыка', filter: 'mix' }
  ];

  try {
    container.innerHTML = '';
    
    for (const cat of cats) {
      const section = document.createElement('div');
      section.className = 'category-section';
      section.innerHTML = `
        <div class="category-header">
          <span class="category-icon">${cat.icon}</span>
          <h2 class="category-title">${cat.title}</h2>
        </div>
        <div class="video-row" id="row-${cat.id}"></div>
      `;
      container.appendChild(section);
      
      const videos = await fetchVideos(cat.query, cat.filter);
      allVideosCache = [...allVideosCache, ...videos];
      
      const row = document.getElementById(`row-${cat.id}`);
      if (!videos.length) {
        row.innerHTML = '<div style="color:var(--text-muted);padding:20px">Нет видео в этой категории</div>';
        continue;
      }
      
      videos.forEach((v, i) => {
        const card = createVideoCard(v, i);
        card.onclick = () => {
          const related = videos.filter(x => x.id !== v.id).slice(0, 8);
          showPlayer(v, related);
        };
        row.appendChild(card);
      });
    }
  } catch (err) {
    container.innerHTML = `<div class="error-msg">❌ ${err.message}</div>`;
  }
}

function createVideoCard(video, index) {
  const card = document.createElement('div');
  card.className = 'video-card';
  card.style.animationDelay = `${index * 0.08}s`;
  
  card.innerHTML = `
    <div class="card-thumb">
      <img src="${video.thumbnail}" alt="${video.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x225/1a1a1f/666?text=No+Preview'">
      <span class="card-badge" style="background:${video.color}">${video.platform}</span>
      <span class="card-duration">${video.time || 'LIVE'}</span>
    </div>
    <div class="card-info">
      <div class="card-title">${video.title}</div>
      <div class="card-meta">
        <span>${video.channel}</span>
        <span>${video.views || ''}</span>
      </div>
    </div>
  `;
  
  return card;
}

// ── Search Functionality ──
async function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;
  
  showSearch();
  document.getElementById('searchQueryText').textContent = `Результаты: "${query}"`;
  document.getElementById('searchGrid').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">Поиск...</div>';
  
  try {
    const results = await fetchVideos(query, 'mix');
    allVideosCache = results;
    
    document.getElementById('searchCountText').textContent = `${results.length} видео найдено`;
    
    const grid = document.getElementById('searchGrid');
    grid.innerHTML = '';
    
    if (!results.length) {
      grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">Ничего не найдено</div>';
      return;
    }
    
    results.forEach((v, i) => {
      const item = document.createElement('div');
      item.className = 'search-item';
      item.style.animationDelay = `${i * 0.1}s`;
      
      item.innerHTML = `
        <div class="search-thumb">
          <img src="${v.thumbnail}" alt="${v.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x225/1a1a1f/666?text=No+Preview'">
          <span class="search-platform" style="background:${v.color}">${v.platform}</span>
          <span class="search-time">${v.time || ''}</span>
        </div>
        <div class="search-info">
          <div class="search-title">${v.title}</div>
          <div class="search-channel">${v.channel}</div>
          <div class="search-views">${v.views || '0 просмотров'}</div>
        </div>
      `;
      
      item.addEventListener('click', () => {
        const related = results.filter(x => x.id !== v.id).slice(0, 8);
        showPlayer(v, related);
      });
      
      grid.appendChild(item);
      
      // Trigger animation
      setTimeout(() => item.classList.add('visible'), i * 100);
    });
    
  } catch (err) {
    document.getElementById('searchGrid').innerHTML = `<div class="error-msg">❌ ${err.message}</div>`;
  }
}

// ── Related Videos ──
function loadRelatedVideos(videos) {
  const container = document.getElementById('relatedList');
  container.innerHTML = '';
  
  if (!videos || !videos.length) {
    container.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:20px">Нет похожих видео</div>';
    return;
  }
  
  videos.forEach(v => {
    const item = document.createElement('div');
    item.className = 'related-item';
    item.innerHTML = `
      <div class="rel-thumb">
        <img src="${v.thumbnail}" loading="lazy" onerror="this.src='https://via.placeholder.com/168x94/1a1a1f/666?text=No+Preview'">
      </div>
      <div class="rel-info">
        <div class="rel-title">${v.title}</div>
        <div class="rel-meta">${v.channel} • ${v.views || ''}</div>
      </div>
    `;
    item.onclick = () => {
      const newRelated = videos.filter(x => x.id !== v.id).slice(0, 8);
      showPlayer(v, newRelated);
    };
    container.appendChild(item);
  });
}

// ── Event Listeners ──
document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') doSearch();
});

document.getElementById('btnLike').addEventListener('click', function() {
  this.classList.toggle('active');
});

document.getElementById('btnShare').addEventListener('click', function() {
  navigator.clipboard?.writeText(window.location.href);
  this.classList.add('active');
  setTimeout(() => this.classList.remove('active'), 1500);
});

document.getElementById('btnSave').addEventListener('click', function() {
  this.classList.toggle('active');
});

// ── Init ──
renderCategories();
</script>
