<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>None Search</title>
<style>
  :root {
    --bg: #0a0a0c;
    --glass: rgba(255, 255, 255, 0.04);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-hover: rgba(255, 255, 255, 0.07);
    --text: #f4f4f6;
    --text-muted: #8a8a96;
    --ease: cubic-bezier(0.25, 0.8, 0.25, 1);
    --glow-r: 180;
    --glow-g: 160;
    --glow-b: 200;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; transition: background 0.6s var(--ease); }

  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
  
  /* Анимация появления видео в поиске */
  @keyframes searchResultAppear {
    0% { opacity: 0; transform: scale(1.5) translateY(-20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ── Top Bar ── */
  .topbar {
    height: 54px; background: rgba(15, 15, 18, 0.95); border-bottom: 1px solid var(--glass-border);
    display: flex; align-items: center; padding: 0 20px; gap: 16px; z-index: 100;
    backdrop-filter: blur(12px); position: sticky; top: 0;
  }
  .logo { font-weight: 800; font-size: 18px; letter-spacing: 1.5px; display: flex; align-items: center; gap: 6px; cursor: pointer; transition: transform 0.2s; }
  .logo:hover { transform: scale(1.05); }
  .logo span { background: var(--text); color: #000; padding: 2px 7px; border-radius: 4px; font-size: 10px; }
  
  .search-wrap { flex: 1; max-width: 580px; margin: 0 auto; position: relative; }
  .search-wrap input {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
    border-radius: 24px; padding: 10px 18px; color: var(--text); font-size: 14px; outline: none; transition: all 0.3s var(--ease);
  }
  .search-wrap input:focus { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); box-shadow: 0 0 12px rgba(255,255,255,0.1); }
  .search-wrap button {
    position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.1); border: none; color: var(--text);
    padding: 7px 14px; border-radius: 16px; cursor: pointer; font-size: 13px; transition: all 0.2s var(--ease);
  }
  .search-wrap button:hover { background: rgba(255,255,255,0.2); transform: translateY(-50%) scale(1.05); }

  /* ── Main Layout ── */
  .main-container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Content Area ── */
  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    transition: all 0.5s var(--ease);
  }

  /* ── Search Results Page ── */
  .search-results {
    display: none;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }
  .search-results.active { display: block; animation: fadeIn 0.3s var(--ease); }
  
  .search-results-header {
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid var(--glass-border);
  }
  .search-results-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 5px;
  }
  .search-results-count {
    font-size: 13px;
    color: var(--text-muted);
  }

  .search-result-item {
    display: flex;
    gap: 16px;
    padding: 12px;
    margin-bottom: 12px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s var(--ease);
    opacity: 0;
    animation: searchResultAppear 0.2s var(--ease) forwards;
  }
  .search-result-item:hover {
    background: var(--glass-hover);
    transform: translateX(5px);
    border-color: rgba(255,255,255,0.15);
  }
  
  .search-result-item.animating {
    animation: searchResultAppear 0.2s var(--ease) forwards;
  }

  .search-thumbnail {
    width: 240px;
    height: 135px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }
  .search-thumbnail img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s var(--ease);
  }
  .search-result-item:hover .search-thumbnail img {
    transform: scale(1.05);
  }
  .search-duration {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.8);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .platform-tag {
    position: absolute;
    top: 8px;
    left: 8px;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    color: #fff;
  }

  .search-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .search-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .search-meta {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .search-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Video Player Page ── */
  .video-player-page {
    display: none;
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
    width: 100%;
  }
  .video-player-page.active { display: flex; gap: 24px; animation: fadeIn 0.4s var(--ease); }

  .player-section {
    flex: 1;
    min-width: 0;
  }

  .video-container {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 80px rgba(0,0,0,0.7);
  }
  
  .video-container iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .video-details {
    margin-top: 20px;
    padding: 20px;
    background: var(--glass);
    border-radius: 12px;
    border: 1px solid var(--glass-border);
  }
  .video-details h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .video-stats {
    display: flex;
    gap: 16px;
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--glass-border);
  }
  .video-actions {
    display: flex;
    gap: 12px;
  }
  .action-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s var(--ease);
    font-size: 14px;
  }
  .action-btn:hover {
    background: rgba(255,255,255,0.1);
    transform: scale(1.05);
  }
  .action-btn.active {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.3);
  }

  /* ── Sidebar (Related Videos) ── */
  .sidebar {
    width: 400px;
    flex-shrink: 0;
    display: none;
  }
  .sidebar.active { display: block; animation: slideIn 0.4s var(--ease); }
  
  .sidebar-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--glass-border);
  }

  .related-video {
    display: flex;
    gap: 12px;
    padding: 10px;
    margin-bottom: 8px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s var(--ease);
  }
  .related-video:hover {
    background: var(--glass-hover);
    transform: translateX(-5px);
    border-color: rgba(255,255,255,0.15);
  }
  
  .related-thumb {
    width: 168px;
    height: 94px;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }
  .related-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .related-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .related-title {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 4px;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .related-meta {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── Placeholder (Home) ── */
  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    color: var(--text-muted);
    gap: 20px;
  }
  .placeholder-icon {
    width: 80px;
    height: 80px;
    opacity: 0.3;
  }
  .placeholder-text {
    font-size: 18px;
    color: var(--text-muted);
  }

  /* ── Animations for buttons ── */
  .btn-interactive {
    transition: all 0.2s var(--ease);
  }
  .btn-interactive:hover {
    transform: scale(1.05);
  }
  .btn-interactive:active {
    transform: scale(0.95);
  }

  /* ── Responsive ── */
  @media (max-width: 1200px) {
    .sidebar { width: 350px; }
    .search-thumbnail { width: 200px; height: 112px; }
  }
  @media (max-width: 968px) {
    .video-player-page.active { flex-direction: column; }
    .sidebar { width: 100%; }
    .search-thumbnail { width: 168px; height: 94px; }
  }
</style>
</head>
<body>

<nav class="topbar">
  <div class="logo" onclick="showHome()">None<span>Search</span></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Поиск по YouTube, Dailymotion, Rutube...">
    <button id="searchBtn" class="btn-interactive">🔍</button>
  </div>
</nav>

<div class="main-container">
  <div class="content-area">
    
    <!-- Home/Placeholder -->
    <div id="homePage" class="placeholder">
      <svg class="placeholder-icon" width="80" height="80" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"/>
      </svg>
      <div class="placeholder-text">Введите запрос для поиска видео</div>
    </div>

    <!-- Search Results -->
    <div id="searchResults" class="search-results">
      <div class="search-results-header">
        <div class="search-results-title" id="searchTitle">Результаты поиска</div>
        <div class="search-results-count" id="searchCount">0 видео найдено</div>
      </div>
      <div id="resultsList"></div>
    </div>

    <!-- Video Player -->
    <div id="videoPlayer" class="video-player-page">
      <div class="player-section">
        <div class="video-container">
          <iframe id="videoFrame" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <div class="video-details">
          <h1 id="playerTitle">Название видео</h1>
          <div class="video-stats">
            <span id="playerChannel">Канал</span>
            <span id="playerViews">0 просмотров</span>
            <span id="playerDate">Сегодня</span>
          </div>
          <div class="video-actions">
            <button class="action-btn btn-interactive" id="likeBtn">
              <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14zM7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>
              <span id="likeCount">0</span>
            </button>
            <button class="action-btn btn-interactive" id="dislikeBtn">
              <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="transform:rotate(180deg)"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14zM7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>
            </button>
            <button class="action-btn btn-interactive" id="shareBtn">
              <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
              Поделиться
            </button>
            <button class="action-btn btn-interactive" id="saveBtn">
              <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
              Сохранить
            </button>
          </div>
        </div>
      </div>
      
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-title">Похожие видео</div>
        <div id="relatedList"></div>
      </aside>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════
//  ⚠️ ЗАМЕНИТЕ НА ВАШ БЭКЕНД!
// ═══════════════════════════════════════
const API_URL = 'https://your-backend.railway.app';

let currentVideo = null;
let searchResultsData = [];
let likeState = false;
let saveState = false;

// ── Navigation ──
function showHome() {
  document.getElementById('homePage').style.display = 'flex';
  document.getElementById('searchResults').classList.remove('active');
  document.getElementById('videoPlayer').classList.remove('active');
  document.getElementById('sidebar').classList.remove('active');
  document.getElementById('searchInput').value = '';
}

function showSearch() {
  document.getElementById('homePage').style.display = 'none';
  document.getElementById('videoPlayer').classList.remove('active');
  document.getElementById('searchResults').classList.add('active');
}

function showVideo(video, relatedVideos = []) {
  currentVideo = video;
  document.getElementById('homePage').style.display = 'none';
  document.getElementById('searchResults').classList.remove('active');
  document.getElementById('videoPlayer').classList.add('active');
  document.getElementById('sidebar').classList.add('active');
  
  // Update player
  document.getElementById('playerTitle').textContent = video.title;
  document.getElementById('playerChannel').textContent = video.channel;
  document.getElementById('playerViews').textContent = video.views || '0 просмотров';
  
  // Load video iframe (hide YouTube controls with controls=0)
  let embedUrl = '';
  if (video.platform === 'YouTube') {
    const urlParams = new URLSearchParams(new URL(video.url).search);
    const videoId = urlParams.get('v');
    embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=0&modestbranding=1&rel=0`;
  } else if (video.platform === 'Dailymotion') {
    const parts = video.url.split('/');
    const videoId = parts[parts.length - 1];
    embedUrl = `https://www.dailymotion.com/embed/video/${videoId}?autoplay=1`;
  } else if (video.platform === 'Rutube') {
    const cleanId = video.url.split('/').filter(Boolean).pop();
    embedUrl = `https://rutube.ru/play/embed/${cleanId}?autoplay=1`;
  }
  
  document.getElementById('videoFrame').src = embedUrl;
  
  // Load related videos
  loadRelatedVideos(relatedVideos);
  
  // Reset buttons
  likeState = false;
  saveState = false;
  updateActionButtons();
}

// ── Search ──
async function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;
  
  showSearch();
  document.getElementById('searchTitle').textContent = `Результаты: "${query}"`;
  document.getElementById('resultsList').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">Загрузка...</div>';
  
  try {
    const response = await fetch(`${API_URL}/api/search`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query })
    });
    
    if (!response.ok) throw new Error('Ошибка');
    const data = await response.json();
    searchResultsData = data.videos || [];
    
    document.getElementById('searchCount').textContent = `${searchResultsData.length} видео найдено`;
    renderSearchResults(searchResultsData);
    
  } catch (err) {
    document.getElementById('resultsList').innerHTML = '<div style="text-align:center;padding:40px;color:#ff6b6b">❌ Ошибка подключения к бэкенду</div>';
  }
}

function renderSearchResults(videos) {
  const container = document.getElementById('resultsList');
  container.innerHTML = '';
  
  videos.forEach((video, index) => {
    const item = document.createElement('div');
    item.className = 'search-result-item';
    item.style.animationDelay = `${index * 0.1}s`; // Stagger animation
    
    const duration = video.time || '';
    
    item.innerHTML = `
      <div class="search-thumbnail">
        <img src="${video.thumbnail}" alt="${video.title}" onerror="this.src='https://via.placeholder.com/240x135/1a1a1f/666?text=No+Preview'">
        ${duration ? `<span class="search-duration">${duration}</span>` : ''}
        <span class="platform-tag" style="background:${video.color}">${video.platform}</span>
      </div>
      <div class="search-info">
        <div class="search-title">${video.title}</div>
        <div class="search-meta">${video.channel} • ${video.views || '0 просмотров'}</div>
        <div class="search-desc">${video.desc || 'Описание видео...'}</div>
      </div>
    `;
    
    item.addEventListener('click', () => {
      // Find related videos (exclude current)
      const related = searchResultsData.filter(v => v.id !== video.id).slice(0, 8);
      showVideo(video, related);
    });
    
    container.appendChild(item);
    
    // Trigger animation
    setTimeout(() => item.classList.add('animating'), index * 100);
  });
}

// ── Related Videos ──
function loadRelatedVideos(videos) {
  const container = document.getElementById('relatedList');
  container.innerHTML = '';
  
  if (!videos.length) {
    container.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:20px">Нет похожих видео</div>';
    return;
  }
  
  videos.forEach(video => {
    const item = document.createElement('div');
    item.className = 'related-video btn-interactive';
    item.innerHTML = `
      <div class="related-thumb">
        <img src="${video.thumbnail}" alt="${video.title}" onerror="this.src='https://via.placeholder.com/168x94/1a1a1f/666?text=No+Preview'">
      </div>
      <div class="related-info">
        <div class="related-title">${video.title}</div>
        <div class="related-meta">${video.channel}</div>
        <div class="related-meta">${video.views || ''}</div>
      </div>
    `;
    item.addEventListener('click', () => {
      const newRelated = searchResultsData.filter(v => v.id !== video.id).slice(0, 8);
      showVideo(video, newRelated);
    });
    container.appendChild(item);
  });
}

// ── Action Buttons ──
function updateActionButtons() {
  const likeBtn = document.getElementById('likeBtn');
  const saveBtn = document.getElementById('saveBtn');
  
  likeBtn.classList.toggle('active', likeState);
  saveBtn.classList.toggle('active', saveState);
}

document.getElementById('likeBtn').addEventListener('click', function() {
  likeState = !likeState;
  updateActionButtons();
});

document.getElementById('dislikeBtn').addEventListener('click', function() {
  likeState = false;
  updateActionButtons();
});

document.getElementById('shareBtn').addEventListener('click', function() {
  navigator.clipboard?.writeText(window.location.href);
  this.classList.add('active');
  setTimeout(() => this.classList.remove('active'), 1500);
});

document.getElementById('saveBtn').addEventListener('click', function() {
  saveState = !saveState;
  updateActionButtons();
});

// ── Event Listeners ──
document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') doSearch();
});

// Initial state
showHome();
</script>
</body>
</html>
